<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/selectors.css">
</head>

<body>
    <h1>Login</h1>
    <div class="login-div">
        <div class="form-group">
            <label for="">Email</label>
            <input type="email" name="email" class="blue form-control">
        </div>
        <div class="form-group">
            <label for="">Password</label>
            <input type="password" name="password" class="form-control red">
        </div>
        <div class="form-group">
            <button type="button" class="submit-btn">Login</button>
        </div>
    </div>

    <ul>
        <li>Kenyér</li>
        <li>Tej</li>
        <li>Cukor</li>
    </ul>

    <div class="container">
        <form>
            <div>
                <label for="name">Név: *</label>
                <input type="text" name="name" id="name" placeholder="Név..." required>
            </div>
            <div>
                <label for="email">Email: *</label>
                <input type="email" name="email" id="email" placeholder="Email cím..." required>
            </div>
            <div>
                <label for="address">Cím: *</label>
                <input type="text" name="address" id="address" placeholder="Cím..." required>
            </div>
            <div>
                <label for="comment">Megjegyzés:</label>
                <textarea name="comment" id="comment" cols="30" rows="10"></textarea>
            </div>
            <span>Extra feltét</span>
            <div>
                <input checked id="nothing" name="nothing" type="checkbox" value="0">
                <label for="nothing">Nem kérek</label>
            </div>
            <div>
                <input id="cheese" name="cheese" type="checkbox" value="300">
                <label for="cheese">Feltét 1</label>
            </div>
            <div>
                <input id="double-cheese" name="double-cheese" type="checkbox" value="600">
                <label for="double-cheese">Feltét 2</label>
            </div>
            <div>
                <input id="double-meat" name="double-meat" type="checkbox" value="1000">
                <label for="double-meat">Feltét 3</label>
            </div>
            <div>
                <input id="double-double" name="double-double" type="checkbox" value="1600">
                <label for="double-double">Feltét 4</label>
            </div>
            <div>
                <input id="valami-mas" name="valami-mas" type="checkbox" value="1800">
                <label for="valami-mas">Feltét 5</label>
            </div>
            <div>
                <label for="sauce">Szósz:</label>
                <select name="sauce" id="sauce">
                    <option value="0">szósz 1</option>
                    <option value="100">szósz 2</option>
                </select>
            </div>
            <div>
                <label for="quantity">Mennyiség:</label>
                <input type="number" id="quantity" name="quantity" min="1" max="10">
            </div>
        </form>
    </div>
</body>

</html>
